name: Dashboard Update

on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'   # 봇 커밋이 다시 트리거 안 되도록
      - 'data/**'
  schedule:
    # UTC 06:30 = KST 15:30 (한국 장 마감) — 월~금
    - cron: '30 6 * * 1-5'
  workflow_dispatch: # GitHub에서 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dashboard update
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
        run: python main.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/data.json
          git diff --staged --quiet || git commit -m "auto: dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
