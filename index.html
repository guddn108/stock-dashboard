<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>투자 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1f2328;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #1f2328;
    }
    .update-time {
      font-size: 12px;
      color: #656d76;
    }

    /* ── 탭 ── */
    .tab-bar {
      display: flex;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      padding: 0 20px;
    }
    .tab-btn {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #656d76;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active {
      color: #0969da;
      border-bottom-color: #0969da;
    }
    .tab-btn:hover:not(.active) {
      color: #424a53;
    }

    /* ── 탭 컨텐츠 ── */
    .tab-content { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
    .tab-content.active { display: block; }

    /* ── 섹션 헤더 ── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #656d76;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 24px 0 12px;
    }
    .section-title:first-child { margin-top: 0; }

    /* ── 뉴스 카드 (탭1) ── */
    .news-card {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .news-card-header {
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
    }
    .news-card-header:hover { background: #eaeef2; }

    .news-card .news-source-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .badge-kr { background: #ddf4ff; color: #0969da; }
    .badge-us { background: #dafbe1; color: #1a7f37; }

    .news-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: #1f2328;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .news-card .news-summary {
      font-size: 13px;
      color: #656d76;
      line-height: 1.6;
      margin-bottom: 0;
    }
    .news-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .news-toggle-label {
      font-size: 12px;
      color: #0969da;
      font-weight: 600;
    }
    .news-chevron {
      font-size: 11px;
      color: #656d76;
      transition: transform 0.2s;
    }
    .news-card.open .news-chevron { transform: rotate(180deg); }

    /* ── 분석 그리드 (탭1) ── */
    .news-analysis-detail {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid #eaeef2;
    }
    .news-card.open .news-analysis-detail { display: block; }

    .analysis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }
    @media (max-width: 600px) {
      .analysis-grid { grid-template-columns: 1fr; }
    }
    .analysis-item {
      background: #ffffff;
      border: 1px solid #eaeef2;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .analysis-item .item-label {
      font-size: 11px;
      color: #656d76;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .analysis-item .item-value {
      font-size: 13px;
      color: #424a53;
      line-height: 1.5;
    }
    .analysis-item.full-width { grid-column: 1 / -1; }

    /* ── 종목 카드 (탭2) ── */
    .stock-card {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .stock-card-header {
      padding: 14px 18px 12px;
      cursor: pointer;
      user-select: none;
    }
    .stock-card-header:hover { background: #eaeef2; }
    .stock-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .opinion-summary {
      font-size: 12px;
      color: #656d76;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid #eaeef2;
      line-height: 1.5;
    }
    .opinion-summary .badge-inline {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 10px;
      margin-right: 5px;
    }

    .stock-name-wrap { display: flex; align-items: center; gap: 10px; }
    .stock-ticker {
      font-size: 13px;
      font-weight: 700;
      color: #0969da;
      background: #ddf4ff;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .stock-name { font-size: 14px; font-weight: 600; color: #1f2328; }

    .stock-price-wrap { text-align: right; }
    .stock-price { font-size: 16px; font-weight: 700; color: #1f2328; }
    .stock-change {
      font-size: 12px;
      font-weight: 600;
      margin-top: 2px;
    }
    .change-up { color: #cf222e; }
    .change-down { color: #0969da; }

    .chevron {
      font-size: 16px;
      color: #656d76;
      margin-left: 12px;
    }

    /* ── 종목 상세 그리드 (바텀시트 내부에서 재사용) ── */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }
    @media (max-width: 600px) {
      .detail-grid { grid-template-columns: 1fr; }
    }
    .detail-item {
      background: #ffffff;
      border: 1px solid #eaeef2;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .detail-item .d-label {
      font-size: 11px;
      color: #656d76;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .detail-item .d-value {
      font-size: 13px;
      color: #424a53;
      line-height: 1.5;
    }
    .detail-item.full { grid-column: 1 / -1; }

    /* 의견 뱃지 */
    .opinion-badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
    }
    .op-buy { background: #dafbe1; color: #1a7f37; }
    .op-hold { background: #fff8c5; color: #9a6700; }
    .op-sell { background: #ffebe9; color: #cf222e; }

    /* 로딩 상태 */
    .loading-placeholder {
      background: linear-gradient(90deg, #eaeef2 25%, #f6f8fa 50%, #eaeef2 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      height: 14px;
      margin: 4px 0;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── 매입가 / P&L / 액션 시그널 ── */
    .pnl-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid #eaeef2;
      font-size: 12px;
      flex-wrap: wrap;
    }
    .pnl-label { color: #656d76; font-size: 11px; }
    .pnl-value { font-weight: 700; font-size: 15px; }
    .pnl-pos   { color: #cf222e; }
    .pnl-neg   { color: #0969da; }
    .action-signal {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 10px;
      margin-left: auto;
      white-space: nowrap;
    }
    .action-hold   { background: #fff8c5; color: #9a6700; }
    .action-buy    { background: #ddf4ff; color: #0969da; }
    .action-sell   { background: #ffebe9; color: #cf222e; }
    .action-profit { background: #dafbe1; color: #1a7f37; }

    /* ── 키 메트릭 미니 바 ── */
    .stock-metrics {
      display: flex;
      gap: 14px;
      margin-top: 7px;
      font-size: 11px;
      color: #656d76;
      flex-wrap: wrap;
    }
    .metric-val { color: #424a53; font-weight: 600; }

    /* ── 뉴스 퀵 인사이트 ── */
    .quick-insight {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      padding: 7px 10px;
      background: #ffffff;
      border-radius: 6px;
      font-size: 11px;
      flex-wrap: wrap;
      align-items: center;
    }
    .qi-benefit { color: #1a7f37; font-weight: 600; }
    .qi-damage  { color: #cf222e; font-weight: 600; }
    .qi-flow    { color: #9a6700; }
    .qi-sep     { color: #d0d7de; }

    /* ══════════════════════════════════════════
       종목 상세 바텀시트 (모바일 우선)
       ══════════════════════════════════════════ */
    body.sheet-open { overflow: hidden; }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(1, 4, 9, 0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 200;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: auto; }

    .stock-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 640px;
      margin: 0 auto;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.3, 1);
      z-index: 201;
      box-shadow: 0 -12px 32px rgba(0, 0, 0, 0.5);
    }
    .stock-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #d0d7de;
      border-radius: 2px;
      margin: 10px auto 2px;
      flex-shrink: 0;
    }
    .sheet-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 18px 14px;
      border-bottom: 1px solid #eaeef2;
      flex-shrink: 0;
    }
    .sheet-header-main { display: flex; flex-direction: column; gap: 4px; }
    .sheet-header-price { text-align: right; }
    .sheet-close {
      background: #eaeef2;
      border: none;
      color: #424a53;
      width: 30px;
      height: 30px;
      min-width: 30px;
      border-radius: 50%;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
    }
    .sheet-body {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 18px 40px;
    }
    /* ── 상세정보 전체를 한 번에 펼치는 토글 — 기본은 접힌 채로 시작 ── */
    .sheet-detail-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid #eaeef2;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #24292f;
      cursor: pointer;
      user-select: none;
    }
    .sheet-detail-toggle:active { background: #f6f8fa; }
    .sheet-accordion-chevron {
      font-size: 12px;
      color: #656d76;
      transition: transform 0.2s;
    }
    .sheet-detail-toggle.open .sheet-accordion-chevron { transform: rotate(180deg); }
    .sheet-detail-all { display: none; }
    .sheet-detail-all.open { display: block; }
    .sheet-section-title {
      font-size: 12px;
      font-weight: 700;
      color: #656d76;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 20px 0 8px;
    }
    .sheet-detail-all > .sheet-section-title:first-child { margin-top: 16px; }

    /* ── 핵심 요약 스탯 타일 ── */
    .quick-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 6px;
    }
    .stat-tile {
      background: #ffffff;
      border: 1px solid #eaeef2;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .stat-tile.wide { grid-column: 1 / -1; }
    .stat-label { font-size: 11px; color: #656d76; font-weight: 600; margin-bottom: 4px; }
    .stat-val { font-size: 15px; font-weight: 700; color: #1f2328; }
    .stat-val.small { font-size: 13px; font-weight: 500; color: #424a53; line-height: 1.5; }

    /* ── 52주 레인지 바 / RSI 게이지 (마크: 얇은 트랙 + 둥근 마커) ── */
    .gauge-wrap { margin: 16px 0; }
    .gauge-label-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #656d76;
      margin-bottom: 16px;
    }
    .gauge-track {
      position: relative;
      height: 4px;
      border-radius: 2px;
      background: #eaeef2;
    }
    .rsi-track {
      background: linear-gradient(to right,
        #0969da 0%, #0969da 30%,
        #d0d7de 30%, #d0d7de 70%,
        #cf222e 70%, #cf222e 100%);
    }
    .gauge-tick {
      position: absolute;
      top: -3px;
      width: 2px;
      height: 10px;
      border-radius: 1px;
    }
    .gauge-marker {
      position: absolute;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #1f2328;
      border: 2px solid #f6f8fa;
      box-shadow: 0 0 0 2px #0969da;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

  <header>
    <h1>📊 투자 대시보드</h1>
    <span class="update-time" id="update-time">업데이트: --</span>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('tab1', this)">뉴스 분석</button>
    <button class="tab-btn" onclick="switchTab('tab2', this)">종목 분석</button>
  </div>

  <!-- ══════════════ 탭1: 뉴스 분석 ══════════════ -->
  <div id="tab1" class="tab-content active">

    <div class="section-title">🇰🇷 한국 뉴스</div>
    <div id="news-kr"><!-- inject_news_kr --></div>

    <div class="section-title">🇺🇸 미국 뉴스</div>
    <div id="news-us"><!-- inject_news_us --></div>

  </div>

  <!-- ══════════════ 탭2: 종목 분석 ══════════════ -->
  <div id="tab2" class="tab-content">

    <div class="section-title">👀 관심종목</div>
    <div id="watchlist"><!-- inject_watchlist --></div>

    <div class="section-title">💼 보유종목</div>
    <div id="holdings"><!-- inject_holdings --></div>

  </div>

  <!-- ══════════════ 종목 상세 바텀시트 ══════════════ -->
  <div class="sheet-overlay" id="sheet-overlay" onclick="closeStockSheet()"></div>
  <div class="stock-sheet" id="stock-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-header-main">
        <span class="stock-ticker" id="sheet-ticker"></span>
        <span class="stock-name" id="sheet-name"></span>
      </div>
      <div class="sheet-header-price">
        <div class="stock-price" id="sheet-price"></div>
        <div class="stock-change" id="sheet-change"></div>
      </div>
      <button class="sheet-close" onclick="closeStockSheet()">✕</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>

  <script>
    // ── 탭 전환 ──
    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    // ── 뉴스 카드 펼치기/접기 ──
    function toggleNews(card) {
      card.classList.toggle('open');
    }

    // ── 종목 상세 바텀시트 열기/닫기 ──
    const STOCK_LOOKUP = {};

    function openStockSheet(key) {
      const s = STOCK_LOOKUP[key];
      if (!s) return;
      document.getElementById('sheet-ticker').textContent = s.ticker;
      document.getElementById('sheet-name').textContent = s.name;
      document.getElementById('sheet-price').textContent = s.price;
      const chEl = document.getElementById('sheet-change');
      chEl.textContent = (s.changeVal >= 0 ? '▲ ' : '▼ ') + Math.abs(s.changeVal) + '%';
      chEl.className = 'stock-change ' + (s.changeVal >= 0 ? 'change-up' : 'change-down');
      document.getElementById('sheet-body').innerHTML = buildStockSheetBody(s);
      document.getElementById('sheet-body').scrollTop = 0;
      document.getElementById('sheet-overlay').classList.add('open');
      document.getElementById('stock-sheet').classList.add('open');
      document.body.classList.add('sheet-open');
    }

    function closeStockSheet() {
      document.getElementById('sheet-overlay').classList.remove('open');
      document.getElementById('stock-sheet').classList.remove('open');
      document.body.classList.remove('sheet-open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeStockSheet();
    });

    // ── 핵심 요약 스탯 타일 ──
    function buildQuickStats(s) {
      const tiles = [];
      tiles.push(`<div class="stat-tile wide">
        <div class="stat-label">투자 의견</div>
        <div class="stat-val"><span class="opinion-badge ${s.opinionClass}">${s.opinion}</span>
        <span style="font-size:12px;color:#656d76;font-weight:600;margin-left:6px;">확률 ${s.opinionProb}%</span></div>
      </div>`);
      if (s.opinionSimple) {
        tiles.push(`<div class="stat-tile wide">
          <div class="stat-label">한줄 요약</div>
          <div class="stat-val small">${s.opinionSimple}</div>
        </div>`);
      }
      if (s.pnlPct != null) {
        const cls = s.pnlPct >= 0 ? 'pnl-pos' : 'pnl-neg';
        tiles.push(`<div class="stat-tile">
          <div class="stat-label">매입가 대비</div>
          <div class="stat-val ${cls}">${s.pnlPct >= 0 ? '+' : ''}${s.pnlPct.toFixed(1)}%</div>
        </div>`);
      }
      tiles.push(`<div class="stat-tile"><div class="stat-label">적정가</div><div class="stat-val">${s.fairValue}</div></div>`);
      tiles.push(`<div class="stat-tile"><div class="stat-label">손절가</div><div class="stat-val" style="color:#0969da;">${s.stopLoss}</div></div>`);
      tiles.push(`<div class="stat-tile"><div class="stat-label">6개월 목표가</div><div class="stat-val" style="color:#cf222e;">${s.target6m}</div></div>`);
      tiles.push(`<div class="stat-tile"><div class="stat-label">1년 목표가</div><div class="stat-val" style="color:#cf222e;">${s.target1y}</div></div>`);
      return `<div class="quick-stats">${tiles.join('')}</div>`;
    }

    // ── 52주 레인지 바 (지지/저항 눈금 포함) ──
    function buildRangeGauge(s) {
      const low = s.low52wRaw, high = s.high52wRaw, price = s.priceRaw;
      if (low == null || high == null || price == null || high <= low) return '';
      const pct = v => Math.max(0, Math.min(100, ((v - low) / (high - low)) * 100));
      const ticks = []
        .concat((s.supportRaw || []).map(v => [v, '#0969da']))
        .concat((s.resistanceRaw || []).map(v => [v, '#cf222e']))
        .filter(([v]) => v != null && v >= low && v <= high)
        .map(([v, color]) => `<div class="gauge-tick" style="left:${pct(v)}%;background:${color};"></div>`)
        .join('');
      return `<div class="gauge-wrap">
        <div class="gauge-label-row"><span>52주 최저 ${s.low52w}</span><span>52주 최고 ${s.high52w}</span></div>
        <div class="gauge-track">
          ${ticks}
          <div class="gauge-marker" style="left:${pct(price)}%;"></div>
        </div>
      </div>`;
    }

    // ── RSI 게이지 (과매도 30 / 과매수 70 구간 표시) ──
    function buildRsiGauge(s) {
      const rsi = s.rsiRaw;
      if (rsi == null || isNaN(rsi)) return '';
      const pct = Math.max(0, Math.min(100, rsi));
      const zone = rsi >= 70 ? '과매수' : rsi <= 30 ? '과매도' : '중립';
      return `<div class="gauge-wrap">
        <div class="gauge-label-row"><span>RSI</span><span>${rsi} · ${zone}</span></div>

    function detailSection(title, pairs) {
      const items = pairs
        .filter(([, val]) => val != null && val !== '')
        .map(([label, val]) => `<div class="detail-item"><div class="d-label">${label}</div><div class="d-value">${val}</div></div>`)
        .join('');
      if (!items) return '';
      return `<div class="sheet-section-title">${title}</div><div class="detail-grid">${items}</div>`;
    }

      document.getElementById('sheet-detail-all').classList.toggle('open');

    function buildStockSheetBody(s) {
      const allDetails =
        detailSection('기업 개요', [
          ['사업 모델', s.businessModel],
          ['산업 전망', s.industryOutlook],
          ['경쟁사 비교', s.competitors],
          ['경제적 해자', s.moat],

        detailSection('실적 · 밸류에이션', [
          ['최근 실적', s.recentEarnings],
          ['재무제표', s.financials],
          ['밸류에이션', s.valuation],
        ]) +
        detailSection('수급 · 시장 신호', [
          ['기관 매수/매도', s.institutionalFlow],
          ['내부자 매매', s.insiderTrading],
          ['옵션 시장', s.options],
          ['공매도 비율', s.shortRatio],
        ]) +
        detailSection('일정 · 이벤트', [
          ['실적 발표 일정', s.earningsDate],
          ['주요 이벤트', s.events],
        ]) +
        detailSection('기술적 분석 (전문가용 · 숫자로 보기)', [
          ['판단 근거 상세', s.opinionSummary],
          ['최근 뉴스 영향', s.recentNews],
          ['일봉 분석', s.dailyChart],
          ['주봉 분석', s.weeklyChart],
          ['월봉 분석', s.monthlyChart],
          ['분할매수 구간', s.buyZone],
        ]) +
        detailSection('시나리오', [
          ['상승 시나리오', s.bullCase],
          ['하락 시나리오', s.bearCase],

      return (
        buildQuickStats(s) +
        buildRangeGauge(s) +
        buildRsiGauge(s) +
        `<div class="sheet-detail-toggle" onclick="toggleAllDetails(this)">
          <span>상세정보 보기</span><span class="sheet-accordion-chevron">▾</span>
        </div>

    function renderStocks(containerId, stocks) {
      const container = document.getElementById(containerId);
      container.innerHTML = stocks.map((s, idx) => {
        const key = containerId + '-' + idx;
        STOCK_LOOKUP[key] = s;

        // P&L 행 (보유종목만)
        let pnlRow = '';
        if (s.pnlPct != null) {
          const cls   = s.pnlPct >= 0 ? 'pnl-pos' : 'pnl-neg';
          const arrow = s.pnlPct >= 0 ? '▲' : '▼';
          const sign  = s.pnlPct >= 0 ? '+' : '';
          let action = '⚪ 보유 유지', actionCls = 'action-hold';
          if      (s.opinionClass === 'op-sell' && s.pnlPct < -5) { action = '🔴 손절 검토';      actionCls = 'action-sell';   }
          else if (s.opinionClass === 'op-sell' && s.pnlPct >= 5) { action = '🟢 이익실현 고려';  actionCls = 'action-profit'; }
          else if (s.opinionClass === 'op-buy'  && s.pnlPct < 0)  { action = '📉 추가매수 검토';  actionCls = 'action-buy';    }
          else if (s.opinionClass === 'op-buy')                    { action = '✅ 보유 유지';       actionCls = 'action-hold';   }
          pnlRow = `<div class="pnl-row">
            <span class="pnl-label">매입가 ${s.costBasis || '-'}</span>
            <span class="pnl-value ${cls}">${arrow} ${sign}${Math.abs(s.pnlPct).toFixed(1)}%</span>
            <span class="action-signal ${actionCls}">${action}</span>
          </div>`;
        }
        // 키 메트릭 (RSI, 목표가, 손절)
        const rsiVal = s.rsiRaw != null ? s.rsiRaw : (s.dailyChart || '').match(/RSI\s*([\d.]+)/)?.[1];
        const metricsRow = `<div class="stock-metrics">
          ${rsiVal ? `<span>RSI <span class="metric-val">${rsiVal}</span></span>` : ''}
          ${s.target1y  ? `<span>목표가 <span class="metric-val">${s.target1y}</span></span>` : ''}
          ${s.stopLoss  ? `<span>손절 <span class="metric-val">${s.stopLoss}</span></span>` : ''}
          ${s.buyZone   ? `<span>매수구간 <span class="metric-val">${(s.buyZone||'').split(',')[0]}</span></span>` : ''}
        </div>`;
        return `
        <div class="stock-card" onclick="openStockSheet('${key}')">
          <div class="stock-card-header">
            <div class="stock-card-top">
              <div class="stock-name-wrap">
                <span class="opinion-badge ${s.opinionClass}" style="font-size:11px;padding:2px 10px;">${s.opinion} ${s.opinionProb}%</span>
                <span class="stock-ticker">${s.ticker}</span>
                <span class="stock-name">${s.name}</span>
              </div>
              <div style="display:flex;align-items:center;">
                <div class="stock-price-wrap">
                  <div class="stock-price">${s.price}</div>
                  <div class="stock-change ${s.changeVal >= 0 ? 'change-up' : 'change-down'}">
                    ${s.changeVal >= 0 ? '▲' : '▼'} ${Math.abs(s.changeVal)}%
                  </div>
                </div>
                <span class="chevron">›</span>
              </div>
            </div>
            ${pnlRow}
            ${s.opinionSummary ? `<div class="opinion-summary">${s.opinionSummary}</div>` : ''}
            ${metricsRow}
          </div>
        </div>`;
      }).join('');
    }
