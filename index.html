<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>투자 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #f0f6fc;
    }
    .update-time {
      font-size: 12px;
      color: #8b949e;
    }

    /* ── 탭 ── */
    .tab-bar {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 20px;
    }
    .tab-btn {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #8b949e;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active {
      color: #58a6ff;
      border-bottom-color: #58a6ff;
    }
    .tab-btn:hover:not(.active) {
      color: #c9d1d9;
    }

    /* ── 탭 컨텐츠 ── */
    .tab-content { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
    .tab-content.active { display: block; }

    /* ── 섹션 헤더 ── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 24px 0 12px;
    }
    .section-title:first-child { margin-top: 0; }

    /* ── 뉴스 카드 (탭1) ── */
    .news-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .news-card-header {
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
    }
    .news-card-header:hover { background: #1c2128; }

    .news-card .news-source-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .badge-kr { background: #1f3a5f; color: #58a6ff; }
    .badge-us { background: #1f3d2f; color: #3fb950; }

    .news-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .news-card .news-summary {
      font-size: 13px;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 0;
    }
    .news-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .news-toggle-label {
      font-size: 12px;
      color: #58a6ff;
      font-weight: 600;
    }
    .news-chevron {
      font-size: 11px;
      color: #8b949e;
      transition: transform 0.2s;
    }
    .news-card.open .news-chevron { transform: rotate(180deg); }

    /* ── 분석 그리드 (탭1) ── */
    .news-analysis-detail {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid #21262d;
    }
    .news-card.open .news-analysis-detail { display: block; }

    .analysis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }
    @media (max-width: 600px) {
      .analysis-grid { grid-template-columns: 1fr; }
    }
    .analysis-item {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .analysis-item .item-label {
      font-size: 11px;
      color: #8b949e;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .analysis-item .item-value {
      font-size: 13px;
      color: #c9d1d9;
      line-height: 1.5;
    }
    .analysis-item.full-width { grid-column: 1 / -1; }

    /* ── 종목 카드 (탭2) ── */
    .stock-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .stock-card-header {
      padding: 14px 18px 12px;
      cursor: pointer;
      user-select: none;
    }
    .stock-card-header:hover { background: #1c2128; }
    .stock-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .opinion-summary {
      font-size: 12px;
      color: #8b949e;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid #21262d;
      line-height: 1.5;
    }
    .opinion-summary .badge-inline {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 10px;
      margin-right: 5px;
    }

    .stock-name-wrap { display: flex; align-items: center; gap: 10px; }
    .stock-ticker {
      font-size: 13px;
      font-weight: 700;
      color: #58a6ff;
      background: #1f3a5f;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .stock-name { font-size: 14px; font-weight: 600; color: #f0f6fc; }

    .stock-price-wrap { text-align: right; }
    .stock-price { font-size: 16px; font-weight: 700; color: #f0f6fc; }
    .stock-change {
      font-size: 12px;
      font-weight: 600;
      margin-top: 2px;
    }
    .change-up { color: #3fb950; }
    .change-down { color: #f85149; }

    .chevron {
      font-size: 12px;
      color: #8b949e;
      margin-left: 12px;
      transition: transform 0.2s;
    }
    .stock-card.open .chevron { transform: rotate(180deg); }

    /* ── 종목 상세 분석 ── */
    .stock-detail {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid #21262d;
    }
    .stock-card.open .stock-detail { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }
    @media (max-width: 600px) {
      .detail-grid { grid-template-columns: 1fr; }
    }
    .detail-item {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .detail-item .d-label {
      font-size: 11px;
      color: #8b949e;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .detail-item .d-value {
      font-size: 13px;
      color: #c9d1d9;
      line-height: 1.5;
    }
    .detail-item.full { grid-column: 1 / -1; }

    /* 의견 뱃지 */
    .opinion-badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
    }
    .op-buy { background: #1f3d2f; color: #3fb950; }
    .op-hold { background: #2d2a1f; color: #e3b341; }
    .op-sell { background: #3d1f1f; color: #f85149; }

    /* 로딩 상태 */
    .loading-placeholder {
      background: linear-gradient(90deg, #21262d 25%, #2d333b 50%, #21262d 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      height: 14px;
      margin: 4px 0;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

  <header>
    <h1>📊 투자 대시보드</h1>
    <span class="update-time" id="update-time">업데이트: --</span>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('tab1', this)">뉴스 분석</button>
    <button class="tab-btn" onclick="switchTab('tab2', this)">종목 분석</button>
  </div>

  <!-- ══════════════ 탭1: 뉴스 분석 ══════════════ -->
  <div id="tab1" class="tab-content active">

    <div class="section-title">🇰🇷 한국 뉴스</div>
    <div id="news-kr"><!-- inject_news_kr --></div>

    <div class="section-title">🇺🇸 미국 뉴스</div>
    <div id="news-us"><!-- inject_news_us --></div>

  </div>

  <!-- ══════════════ 탭2: 종목 분석 ══════════════ -->
  <div id="tab2" class="tab-content">

    <div class="section-title">👀 관심종목</div>
    <div id="watchlist"><!-- inject_watchlist --></div>

    <div class="section-title">💼 보유종목</div>
    <div id="holdings"><!-- inject_holdings --></div>

  </div>

  <script>
    // ── 탭 전환 ──
    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    // ── 뉴스 카드 펼치기/접기 ──
    function toggleNews(card) {
      card.classList.toggle('open');
    }

    // ── 종목 카드 펼치기/접기 ──
    function toggleStock(card) {
      card.classList.toggle('open');
    }

    // ── 업데이트 시간 표시 ──
    function setUpdateTime(dateStr) {
      const el = document.getElementById('update-time');
      el.textContent = '업데이트: ' + (dateStr || new Date().toLocaleString('ko-KR'));
    }

    // ── Mock 데이터 렌더링 (개발용) ──
    // TODO: Python generate_html.py가 이 함수들을 실제 데이터로 교체 예정

    function newsAnalysisHTML(a) {
      if (!a.analysis) return '';
      const d = a.analysis;
      return `
        <div class="news-analysis-detail">
          <div class="analysis-grid">
            <div class="analysis-item full-width">
              <div class="item-label">1. 뉴스 3줄 요약</div>
              <div class="item-value">${d.summary3}</div>
            </div>
            <div class="analysis-item full-width">
              <div class="item-label">2. 왜 지금 이런 뉴스가 나왔는가</div>
              <div class="item-value">${d.why}</div>
            </div>
            <div class="analysis-item full-width">
              <div class="item-label">3. 돈의 흐름</div>
              <div class="item-value">${d.moneyFlow}</div>
            </div>
            <div class="analysis-item">
              <div class="item-label">4. 직접 수혜 산업</div>
              <div class="item-value">${d.directBenefit}</div>
            </div>
            <div class="analysis-item">
              <div class="item-label">5. 간접 수혜 산업</div>
              <div class="item-value">${d.indirectBenefit}</div>
            </div>
            <div class="analysis-item">
              <div class="item-label">6. 직접 피해 산업</div>
              <div class="item-value">${d.directDamage}</div>
            </div>
            <div class="analysis-item">
              <div class="item-label">7. 간접 피해 산업</div>
              <div class="item-value">${d.indirectDamage}</div>
            </div>
            <div class="analysis-item">
              <div class="item-label">8. 관련 미국 주식</div>
              <div class="item-value">${d.usStocks}</div>
            </div>
            <div class="analysis-item">
              <div class="item-label">9. 관련 한국 주식</div>
              <div class="item-value">${d.krStocks}</div>
            </div>
            <div class="analysis-item full-width">
              <div class="item-label">10. 향후 1년 최대 수혜 기업</div>
              <div class="item-value">${d.topBeneficiary}</div>
            </div>
            <div class="analysis-item full-width">
              <div class="item-label">11. 시장이 놓치고 있는 투자 포인트</div>
              <div class="item-value">${d.hiddenPoint}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderNews(containerId, articles, badgeClass, badgeLabel) {
      const container = document.getElementById(containerId);
      container.innerHTML = articles.map(a => `
        <div class="news-card ${a.analysis ? '' : ''}" onclick="toggleNews(this)">
          <div class="news-card-header">
            <span class="news-source-badge ${badgeClass}">${badgeLabel}</span>
            <h3>${a.title}</h3>
            <div class="news-summary">${a.summary}</div>
            ${a.analysis ? `
            <div class="news-toggle-row">
              <span class="news-toggle-label">기관투자자 분석 보기</span>
              <span class="news-chevron">▼</span>
            </div>` : ''}
          </div>
          ${newsAnalysisHTML(a)}
        </div>
      `).join('');
    }

    function renderNewsKr(articles) { renderNews('news-kr', articles, 'badge-kr', '한국'); }
    function renderNewsUs(articles)  { renderNews('news-us', articles, 'badge-us', '미국'); }

    function renderStocks(containerId, stocks) {
      const container = document.getElementById(containerId);
      container.innerHTML = stocks.map(s => `
        <div class="stock-card" onclick="toggleStock(this)">
          <div class="stock-card-header">
            <div class="stock-card-top">
              <div class="stock-name-wrap">
                <span class="stock-ticker">${s.ticker}</span>
                <span class="stock-name">${s.name}</span>
              </div>
              <div style="display:flex; align-items:center;">
                <div class="stock-price-wrap">
                  <div class="stock-price">${s.price}</div>
                  <div class="stock-change ${s.changeVal >= 0 ? 'change-up' : 'change-down'}">
                    ${s.changeVal >= 0 ? '▲' : '▼'} ${Math.abs(s.changeVal)}%
                  </div>
                </div>
                <span class="chevron">▼</span>
              </div>
            </div>
            ${s.opinionSummary ? `
            <div class="opinion-summary">
              <span class="badge-inline ${s.opinionClass}">${s.opinion} ${s.opinionProb}%</span>${s.opinionSummary}
            </div>` : ''}
          </div>
          <div class="stock-detail">
            <div class="detail-grid">
              <div class="detail-item"><div class="d-label">1. 사업 모델</div><div class="d-value">${s.businessModel}</div></div>
              <div class="detail-item"><div class="d-label">2. 산업 전망</div><div class="d-value">${s.industryOutlook}</div></div>
              <div class="detail-item"><div class="d-label">3. 최근 뉴스 영향</div><div class="d-value">${s.recentNews}</div></div>
              <div class="detail-item"><div class="d-label">4. 경쟁사 비교</div><div class="d-value">${s.competitors}</div></div>
              <div class="detail-item"><div class="d-label">5. 경제적 해자</div><div class="d-value">${s.moat}</div></div>
              <div class="detail-item"><div class="d-label">6. AI 수혜 여부</div><div class="d-value">${s.aiBenefit}</div></div>
              <div class="detail-item"><div class="d-label">7. 최근 실적</div><div class="d-value">${s.recentEarnings}</div></div>
              <div class="detail-item"><div class="d-label">8. 재무제표</div><div class="d-value">${s.financials}</div></div>
              <div class="detail-item"><div class="d-label">9. 밸류에이션</div><div class="d-value">${s.valuation}</div></div>
              <div class="detail-item"><div class="d-label">10. 기관 매수/매도</div><div class="d-value">${s.institutionalFlow}</div></div>
              <div class="detail-item"><div class="d-label">11. 내부자 매매</div><div class="d-value">${s.insiderTrading}</div></div>
              <div class="detail-item"><div class="d-label">12. 옵션 시장</div><div class="d-value">${s.options}</div></div>
              <div class="detail-item"><div class="d-label">13. 공매도 비율</div><div class="d-value">${s.shortRatio}</div></div>
              <div class="detail-item"><div class="d-label">14. 실적 발표 일정</div><div class="d-value">${s.earningsDate}</div></div>
              <div class="detail-item"><div class="d-label">15. 주요 이벤트</div><div class="d-value">${s.events}</div></div>
              <div class="detail-item"><div class="d-label">16. 일봉 분석</div><div class="d-value">${s.dailyChart}</div></div>
              <div class="detail-item"><div class="d-label">17. 주봉 분석</div><div class="d-value">${s.weeklyChart}</div></div>
              <div class="detail-item"><div class="d-label">18. 월봉 분석</div><div class="d-value">${s.monthlyChart}</div></div>
              <div class="detail-item"><div class="d-label">19. 주요 지지선</div><div class="d-value">${s.support}</div></div>
              <div class="detail-item"><div class="d-label">20. 주요 저항선</div><div class="d-value">${s.resistance}</div></div>
              <div class="detail-item"><div class="d-label">21. 적정가</div><div class="d-value">${s.fairValue}</div></div>
              <div class="detail-item"><div class="d-label">22. 분할매수 구간</div><div class="d-value">${s.buyZone}</div></div>
              <div class="detail-item"><div class="d-label">23. 손절가</div><div class="d-value">${s.stopLoss}</div></div>
              <div class="detail-item"><div class="d-label">24. 6개월 목표가</div><div class="d-value">${s.target6m}</div></div>
              <div class="detail-item"><div class="d-label">25. 1년 목표가</div><div class="d-value">${s.target1y}</div></div>
              <div class="detail-item full"><div class="d-label">26. 상승 시나리오</div><div class="d-value">${s.bullCase}</div></div>
              <div class="detail-item full"><div class="d-label">27. 하락 시나리오</div><div class="d-value">${s.bearCase}</div></div>
              <div class="detail-item full">
                <div class="d-label">28. 매수/보유/매도 의견</div>
                <div class="d-value">
                  <span class="opinion-badge ${s.opinionClass}">${s.opinion}</span>
                  &nbsp; 확률 ${s.opinionProb}%
                </div>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ════════════════════════════════════════════
    // LIVE_DATA_START — generate_html.py 자동 생성

  "generated_at": "2026-06-17T19:03:22.667042",
  "news": {

      {

      },
      {
